name: incident-commander
version: "1.0.0"
emoji: "🐢"
colorFrom: blue
colorTo: gray
sdk: docker
description: >
  Incident Commander OpenEnv where an LLM agent performs black-box SRE
  investigation and recovery across a stateful frontend-auth-db cluster.
author: Rohith Kumar
tags:
  - openenv
  - reinforcement-learning
  - llm-ops
  - inference
  - scheduling
  - sre
  - agent
  - rl-environment
license: mit
tasks:
  - name: easy
    description: Trace frontend symptoms and recover a simple dependency outage
    difficulty: easy
  - name: medium
    description: Investigate and recover coupled auth-db failures under load
    difficulty: medium
  - name: hard
    description: Resolve config drift and race-condition regressions with verification
    difficulty: hard
  - name: longhaul
    description: Mixed outage long-horizon scenario with noisy telemetry and budget pressure
    difficulty: hard
  - name: blackout
    description: Thundering-herd outage requiring safe and efficient root-cause remediation
    difficulty: hard
