name: incident-commander
version: "1.0.0"
emoji: "🐢"
colorFrom: blue
colorTo: gray
sdk: docker
description: >
  Incident Commander OpenEnv where an LLM agent performs black-box SRE
  investigation and recovery across a stateful frontend-auth-db cluster.
author: Rohith Kumar
observation_space:
  type: text
  description: >
    Service topology snapshot with noisy metrics, masked incidents, timeline,
    and operational hints for black-box incident response.

action_space:
  type: structured
  description: >
    Structured SRE tool actions: inspect, remediate, verify, fail over, and
    communicate under reliability and budget constraints.

endpoints:
  health: /health
  reset: /reset
  step: /step
  state: /state
  grade: /grade
  tasks: /tasks
tags:
  - openenv
  - reinforcement-learning
  - llm-ops
  - inference
  - scheduling
  - sre
  - agent
  - rl-environment
license: mit
tasks:
  - id: easy
    has_grader: true
    description: Trace frontend symptoms and recover a simple dependency outage
    difficulty: easy
    steps: 30
    grader: server.tasks.grade_easy
  - id: medium
    has_grader: true
    description: Investigate and recover coupled auth-db failures under load
    difficulty: medium
    steps: 40
    grader: server.tasks.grade_medium
  - id: hard
    has_grader: true
    description: Resolve config drift, regional packet loss, and race-condition regressions with verification
    difficulty: hard
    steps: 50
    grader: server.tasks.grade_hard
  - id: longhaul
    has_grader: true
    description: Mixed outage long-horizon scenario with noisy telemetry and budget pressure
    difficulty: hard
    steps: 60
    grader: server.tasks.grade_longhaul
  - id: blackout
    has_grader: true
    description: Thundering-herd outage requiring safe and efficient root-cause remediation
    difficulty: hard
    steps: 70
    grader: server.tasks.grade_blackout

scoring:
  reward_range: [0.0, 1.0]
  success_threshold: 0.5

constraints:
  max_runtime_seconds: 1200
  max_memory_gb: 8
  max_vcpu: 2
